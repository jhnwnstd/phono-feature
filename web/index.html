<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phonology Segment &amp; Feature Engine</title>
<!--
  CSP: defense-in-depth on top of the analysis renderer's
  html.escape. style-src needs 'unsafe-inline' because analysis.py
  emits chips with per-element styles; moving chip colors to CSS
  classes would let us drop that. frame-ancestors is omitted: the
  directive is ignored when delivered via <meta>, and GitHub Pages
  doesn't let us set HTTP headers.
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net;
  worker-src 'self' blob:;
  connect-src 'self' https://cdn.jsdelivr.net;
  img-src 'self' data:;
  style-src 'self' 'unsafe-inline';
  font-src 'self';
  object-src 'none';
  base-uri 'none';
  form-action 'none';
">
<!--
  Open the TLS connection and prefetch Pyodide's payloads in
  parallel with HTML parse. pyodide.js is loaded dynamically by
  main.js (not via a static <script> tag) so first paint isn't
  blocked by its CDN fetch; the preload below warms the cache so
  main.js's injected <script> finds it already in flight.
-->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="preload" as="script" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js">
<link rel="preload" as="fetch" type="application/wasm" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.asm.wasm">
<link rel="preload" as="fetch" type="application/javascript" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.asm.js">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<noscript>
  <div class="loading">
    <div class="loading-card">
      <div class="loading-title">JavaScript required</div>
      <p>This phonology app runs entirely in your browser via
        <a href="https://pyodide.org/">Pyodide</a> (Python compiled to
        WebAssembly), so it can&rsquo;t do anything without JavaScript
        enabled. There&rsquo;s no server-side fallback.</p>
    </div>
  </div>
</noscript>
<div id="loading-overlay" class="loading">
  <div class="loading-card">
    <div class="loading-title">Phonology Segment &amp; Feature Engine</div>
    <div class="loading-status" id="loading-status">Loading the Python runtime…</div>
    <progress></progress>
  </div>
</div>

<header class="toolbar">
  <!-- Bridge-gated controls start disabled; main.js re-enables them
       after the bridge attaches so keyboard tab focus can't activate
       them before Pyodide is ready. -->
  <select id="inventory-picker" aria-label="Inventory" disabled></select>
  <button id="rename-btn" type="button" disabled
          aria-label="Rename current inventory" title="Rename inventory">✎</button>
  <button id="upload-btn" type="button" disabled>Browse…</button>
  <input id="upload-input" type="file" accept=".json" hidden>
  <button id="builder-btn" type="button" disabled>Builder</button>
  <button id="download-btn" type="button" disabled>Save as…</button>
  <div class="toolbar-spacer"></div>
  <button id="theme-btn" type="button" aria-label="Toggle theme">☾</button>
</header>

<main class="grid">
  <section class="panel" id="seg-panel" data-active="true">
    <header class="panel-header">
      <span class="panel-title" id="seg-title">SEGMENTS</span>
      <button class="panel-clear-btn" id="seg-clear-btn" type="button"
              aria-label="Clear segment selection">Clear</button>
    </header>
    <div class="panel-body" id="seg-grid"></div>
  </section>
  <section class="panel" id="feat-panel">
    <header class="panel-header">
      <span class="panel-title" id="feat-title">FEATURES</span>
      <button class="panel-clear-btn" id="feat-clear-btn" type="button"
              aria-label="Clear feature query">Clear</button>
    </header>
    <div class="panel-body" id="feat-list"></div>
  </section>
</main>

<section class="analysis" id="analysis-pane">
  <header class="analysis-header">
    <span class="analysis-title">ANALYSIS</span>
    <button id="expand-btn" type="button" aria-label="Maximize analysis pane">⤢</button>
  </header>
  <!--
    Persistent selection header — sits above the tabs so the user
    always sees "Selected: …" / "Query: …" regardless of which tab
    they have active. Content is set by main.js from the shared
    Python ``analysis_tabs.selection`` field.
  -->
  <div class="analysis-selection" id="analysis-selection"></div>
  <!--
    Three-tab interface mirroring the desktop's AnalysisPanel.
    Tab labels and content keys are pinned: Class / Features /
    Contrasts. The view-model returns one HTML string per tab so
    both UIs render the same partition without re-implementing the
    split logic on either side.
  -->
  <div class="analysis-tabs" id="analysis-tabs" role="tablist">
    <button class="analysis-tab" id="analysis-tab-class"
            type="button" role="tab" aria-controls="analysis-content-class"
            data-tab="class" aria-selected="true">Class</button>
    <button class="analysis-tab" id="analysis-tab-features"
            type="button" role="tab" aria-controls="analysis-content-features"
            data-tab="features" aria-selected="false">Features</button>
    <button class="analysis-tab" id="analysis-tab-contrasts"
            type="button" role="tab" aria-controls="analysis-content-contrasts"
            data-tab="contrasts" aria-selected="false">Contrasts</button>
  </div>
  <div class="analysis-content" id="analysis-content-class"
       role="tabpanel" aria-labelledby="analysis-tab-class"></div>
  <div class="analysis-content" id="analysis-content-features"
       role="tabpanel" aria-labelledby="analysis-tab-features" hidden></div>
  <div class="analysis-content" id="analysis-content-contrasts"
       role="tabpanel" aria-labelledby="analysis-tab-contrasts" hidden></div>
</section>

<footer class="statusbar" aria-live="polite">
  <span id="statusbar" class="statusbar-message">Select an inventory from the dropdown to begin.</span>
  <span class="statusbar-brand">Language Doodad</span>
</footer>

<!--
  Builder editor. Mirrors the desktop ``InventoryBuilder`` window:
  toolbar with New / Save as..., editable name strip, then the grid.
  Initially hidden; the main toolbar's Builder button toggles
  ``hidden`` on this block so the editor swaps in as a full-screen
  view (the viewer chrome stays in the DOM but hides behind it).
-->
<section id="editor-view" class="editor-view" hidden>
  <header class="editor-toolbar">
    <button id="editor-exit-btn" type="button"
            aria-label="Close editor and return to viewer">← Back</button>
    <button id="editor-new-btn" type="button">New</button>
    <button id="editor-save-as-btn" type="button">Save as…</button>
    <span class="editor-toolbar-sep" aria-hidden="true"></span>
    <button id="editor-add-seg-btn" type="button">+ Segment</button>
    <button id="editor-add-feat-btn" type="button">+ Feature</button>
    <button id="editor-remove-seg-btn" type="button" disabled
            aria-label="Remove selected segment column">− Segment</button>
    <button id="editor-remove-feat-btn" type="button" disabled
            aria-label="Remove selected feature row">− Feature</button>
    <div class="editor-toolbar-spacer"></div>
  </header>
  <div class="editor-meta">
    <label class="editor-meta-label" for="editor-name-input">Name:</label>
    <input id="editor-name-input" type="text" maxlength="256"
           autocomplete="off" spellcheck="false">
    <span class="editor-meta-file" id="editor-file-label">(unsaved)</span>
  </div>
  <!--
    tabindex on the scroll container so keyboard shortcuts (Space
    cycle, 1/2/3/0 set value, Esc clear) fire reliably. The table
    is not natively focusable.
  -->
  <div class="editor-grid-frame" id="editor-grid-scroll" tabindex="0">
    <div class="editor-grid-pane editor-grid-pane-corner" id="editor-grid-corner"></div>
    <div class="editor-grid-pane editor-grid-pane-cols" id="editor-grid-cols"></div>
    <div class="editor-grid-pane editor-grid-pane-rows" id="editor-grid-rows"></div>
    <div class="editor-grid-pane editor-grid-pane-data" id="editor-grid-data"></div>
  </div>
  <footer class="editor-status" id="editor-status" aria-live="polite">
  </footer>
</section>

<!--
  Single text-prompt modal reused by the editor's + Segment and
  + Feature buttons. JS sets the title, label, and submit handler
  per invocation. Matches the pattern of the rename and setup
  dialogs (one modal per concern, sized small).
-->
<dialog id="label-prompt-dialog" aria-labelledby="label-prompt-title">
  <form method="dialog" id="label-prompt-form">
    <div class="dialog-title" id="label-prompt-title">Add</div>
    <label class="dialog-label" for="label-prompt-input"
           id="label-prompt-label">Label</label>
    <input id="label-prompt-input" type="text" maxlength="256"
           autocomplete="off" spellcheck="false" required>
    <div class="dialog-error" id="label-prompt-error" role="alert"></div>
    <div class="dialog-actions">
      <button type="button" id="label-prompt-cancel">Cancel</button>
      <button type="submit" id="label-prompt-submit">Add</button>
    </div>
  </form>
</dialog>

<dialog id="rename-dialog" aria-labelledby="rename-dialog-title">
  <form method="dialog" id="rename-form">
    <div class="dialog-title" id="rename-dialog-title">Rename inventory</div>
    <label class="dialog-label" for="rename-input">Name</label>
    <input id="rename-input" type="text" maxlength="256" autocomplete="off"
           spellcheck="false" required>
    <div class="dialog-error" id="rename-error" role="alert"></div>
    <div class="dialog-actions">
      <button type="button" id="rename-cancel" value="cancel">Cancel</button>
      <button type="submit" id="rename-save" value="save">Save</button>
    </div>
  </form>
</dialog>

<dialog id="setup-dialog" class="setup-dialog"
        aria-labelledby="setup-dialog-title">
  <form method="dialog" id="setup-form">
    <div class="dialog-title" id="setup-dialog-title">New inventory</div>

    <label class="dialog-label" for="setup-name-input">Inventory name</label>
    <input id="setup-name-input" type="text" maxlength="256"
           autocomplete="off" spellcheck="false"
           placeholder="e.g. My Language Inventory">

    <div class="setup-field-header">
      <label class="dialog-label" for="setup-segments-input">
        Segments (delimited)
      </label>
    </div>
    <textarea id="setup-segments-input" rows="4" spellcheck="false"
              autocomplete="off"></textarea>

    <div class="setup-field-header">
      <label class="dialog-label" for="setup-features-input">
        Features (delimited)
      </label>
      <select id="setup-preset-picker" aria-label="Feature preset">
      </select>
    </div>
    <textarea id="setup-features-input" rows="10" spellcheck="false"
              autocomplete="off"></textarea>

    <div class="dialog-error" id="setup-error" role="alert"></div>
    <div class="dialog-actions">
      <button type="button" id="setup-cancel" value="cancel">Cancel</button>
      <button type="submit" id="setup-create" value="create">Create grid</button>
    </div>
  </form>
</dialog>

<script type="module" src="main.js"></script>
</body>
</html>
