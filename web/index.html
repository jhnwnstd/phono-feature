<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phonology Segment &amp; Feature Engine</title>
<!--
  Content Security Policy. Restricts which origins can supply
  scripts, workers, and other resources, providing defense-in-depth
  against XSS even though analysis.py already escapes user strings.

  Pyodide needs 'wasm-unsafe-eval' for its WebAssembly compile and
  blob: workers for its worker pool; it loads from JSDelivr (swap
  the origin if you self-host).

  style-src includes 'unsafe-inline' because analysis.py emits chips
  with per-element inline styles (background and color baked from
  the active palette so they survive the QTextEdit / browser DOM
  swap). A future refactor that moves chip styling to CSS classes
  would let us drop this and lock style-src to 'self' too. Inline-
  style XSS is meaningfully less severe than inline-script XSS, and
  the user text in chips is escaped via html.escape at the chip-
  building level.
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'wasm-unsafe-eval' https://cdn.jsdelivr.net;
  worker-src 'self' blob:;
  connect-src 'self' https://cdn.jsdelivr.net;
  img-src 'self' data:;
  style-src 'self' 'unsafe-inline';
  font-src 'self';
  object-src 'none';
  base-uri 'none';
  form-action 'none';
">
<!--
  frame-ancestors is intentionally omitted here. The directive is
  ignored when delivered via <meta> (HTML spec; only HTTP headers
  honor it). GitHub Pages doesn't let us set arbitrary headers, so
  we accept the gap. To prevent clickjacking entirely, deploy
  behind a host that sets X-Frame-Options: DENY or the equivalent
  Content-Security-Policy header.
-->
<!--
  Hint the browser to set up the TLS connection to the Pyodide CDN
  early, in parallel with parsing the rest of the document. Saves
  ~100-300 ms on cold loads. dns-prefetch is a backstop for
  browsers that ignore preconnect.
-->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<!--
  Preload Pyodide's two biggest payloads in parallel with main.js
  compile + run. Without these, the browser doesn't learn about the
  asm.wasm / asm.js requests until loadPyodide() is awaited several
  hundred ms into boot. With them, both downloads start at parse
  time and saturate the connection earlier. Saves 200-400 ms on
  cold loads. The URLs hardcode CDN paths; bump together with the
  pyodide.js <script> tag below and the SRI hash there.
-->
<link rel="preload" as="script" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js">
<link rel="preload" as="fetch" type="application/wasm" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.asm.wasm">
<link rel="preload" as="fetch" type="application/javascript" crossorigin
      href="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.asm.js">
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<noscript>
  <div class="loading">
    <div class="loading-card">
      <div class="loading-title">JavaScript required</div>
      <p>This phonology app runs entirely in your browser via
        <a href="https://pyodide.org/">Pyodide</a> (Python compiled to
        WebAssembly), so it can&rsquo;t do anything without JavaScript
        enabled. There&rsquo;s no server-side fallback.</p>
    </div>
  </div>
</noscript>
<div id="loading-overlay" class="loading">
  <div class="loading-card">
    <div class="loading-title">Phonology Segment &amp; Feature Engine</div>
    <div class="loading-status" id="loading-status">Loading the Python runtime…</div>
    <progress></progress>
    <div class="loading-hint">First load fetches ~10 MB and is cached for next time.</div>
  </div>
</div>

<header class="toolbar">
  <!-- Bridge-gated controls start disabled so a keyboard-tab user
       can't activate them before bootPyodide finishes. enableBridge
       GatedControls() in main.js re-enables them after boot. -->
  <select id="inventory-picker" aria-label="Inventory" disabled></select>
  <button id="upload-btn" type="button" disabled>Open file…</button>
  <input id="upload-input" type="file" accept=".json" hidden>
  <button id="download-btn" type="button" disabled>Save as…</button>
  <div class="toolbar-spacer"></div>
  <button id="theme-btn" type="button" aria-label="Toggle theme">☾</button>
</header>

<main class="grid">
  <section class="panel" id="seg-panel" data-active="true">
    <header class="panel-header">
      <span class="panel-title" id="seg-title">SEGMENTS</span>
      <button class="panel-clear-btn" id="seg-clear-btn" type="button"
              aria-label="Clear segment selection">Clear</button>
    </header>
    <div class="panel-body" id="seg-grid"></div>
  </section>
  <!--
    Right-column stack: features card (sizes to content) plus an
    analysis extension that reclaims the gap below features when
    the features pane is shorter than the segments pane. The
    extension carries the same background as #analysis-pane so the
    two read as one L-shaped analysis area; the actual analysis
    content still lives in #analysis-content below.
  -->
  <div class="right-stack">
    <section class="panel" id="feat-panel">
      <header class="panel-header">
        <span class="panel-title" id="feat-title">FEATURES</span>
        <button class="panel-clear-btn" id="feat-clear-btn" type="button"
                aria-label="Clear feature query">Clear</button>
      </header>
      <div class="panel-body" id="feat-list"></div>
    </section>
    <div class="analysis-extension" aria-hidden="true"></div>
  </div>
</main>

<section class="analysis" id="analysis-pane">
  <header class="analysis-header">
    <span class="analysis-title">ANALYSIS</span>
    <button id="expand-btn" type="button" aria-label="Maximize analysis pane">⤢</button>
  </header>
  <div class="analysis-content" id="analysis-content"></div>
</section>

<footer class="statusbar" id="statusbar" aria-live="polite">
  Select an inventory from the dropdown to begin.
</footer>

<!--
  Pyodide's bootstrap file (pyodide.js) is loaded DYNAMICALLY by
  main.js so the bootstrap render path doesn't sit behind a 1-2 s
  CDN fetch. The preload link above gets the fetch started during
  HTML parse; main.js's loadPyodideScript() injects the <script>
  tag once the bootstrap UI has painted. SRI hash + URL live in
  main.js (PYODIDE_BOOTSTRAP_*).
-->
<script type="module" src="main.js"></script>
</body>
</html>
