name: CI

# Verifies that the RUN-* launchers can bootstrap a fresh checkout into a
# working venv on each supported OS, and that the test suite passes inside
# that venv. The launcher is the user-facing install path, so testing it
# end-to-end here is what proves "double-click and go" still works.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR matrices on force-push; let main-branch pushes
# run to completion so per-commit history stays intact.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  launcher:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            launcher: ./RUN-Linux.sh
          - os: macos-latest
            launcher: ./RUN-Mac.command
          - os: windows-latest
            launcher: cmd //c RUN-Windows.bat

    env:
      # Qt has no display on the runner; offscreen is the standard headless plugin.
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Minimum supported. The launcher's pick_python prefers higher
          # versions if available on the runner, so this is the floor.
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            desktop/pyproject.toml
            shared/pyproject.toml
            web/pyproject.toml

      - name: Install Qt runtime dependencies (Linux)
        if: runner.os == 'Linux'
        # PyQt6 wheels link against these system libraries; the ubuntu-latest
        # image doesn't ship them by default. macOS and Windows wheels are
        # self-contained.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libgl1 libegl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Install uv (Linux)
        # uv.lock is committed for reproducibility; the next step fails the
        # build when pyproject.toml's deps change without a matching
        # ``uv lock`` run. The launcher install path still uses pip
        # because that's what end users run; the lockfile is a
        # secondary integrity check, not the primary install method.
        if: runner.os == 'Linux'
        uses: astral-sh/setup-uv@v3

      - name: Verify uv.lock is fresh
        if: runner.os == 'Linux'
        run: uv lock --check

      - name: Smoke-test launcher
        shell: bash
        run: ${{ matrix.launcher }} --help

      - name: Re-run launcher to confirm cached-install path
        # First run installs; second run must short-circuit on the .installed
        # stamp. Catches regressions where the stamp logic stops working.
        shell: bash
        run: ${{ matrix.launcher }} --help

      - name: Expose launcher venv on PATH
        # One PATH/VIRTUAL_ENV export replaces the bin/Scripts branch in
        # every downstream step that runs against the launcher's venv.
        shell: bash
        run: |
          if [[ -d desktop/.venv/bin ]]; then
              echo "$GITHUB_WORKSPACE/desktop/.venv/bin" >> "$GITHUB_PATH"
          else
              echo "$GITHUB_WORKSPACE/desktop/.venv/Scripts" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/desktop/.venv" >> "$GITHUB_ENV"

      - name: Install dev dependencies into the launcher's venv
        # ``[dev,panphon]`` so the New-inventory dialog's PanPhon
        # provider tests run in CI instead of skipping. PanPhon is
        # the same optional extra the launcher's ``tools/install.sh``
        # pulls in for end-user installs, so what CI tests is what
        # users get.
        working-directory: desktop
        shell: bash
        run: python -m pip install --quiet -e ".[dev,panphon]"

      - name: Run isort + black + flake8 + mypy + node --check in the launcher's venv
        # Lint runs ONCE on Linux -- the rules are platform-agnostic and
        # running on every matrix entry would triple the CI minutes for
        # zero coverage gain. The four-tool chain matches the user's
        # local invocation (``isort . --profile black; black -l 79 .;
        # flake8 .; mypy``) so anything green locally is green in CI.
        # node ships on ubuntu-latest; the JS gate is a pre-merge syntax
        # check over the web bundle. ESLint runs in a separate step so
        # the npm-install cost only lands once and so its failures stay
        # legible.
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          isort . --profile black --check-only
          black -l 79 --check .
          flake8 .
          mypy
          node --check web/main.js
          node --check web/sw.js

      - name: Install ESLint via npm ci
        # Reproducible install from web/package-lock.json. Runs once
        # on Linux; ESLint rules are platform-agnostic so the matrix
        # entries on macOS / Windows would just pay the cost twice
        # for the same result.
        if: runner.os == 'Linux'
        working-directory: web
        shell: bash
        run: npm ci

      - name: Run ESLint over web/main.js and web/sw.js
        # ``node --check`` (above) catches syntax errors but nothing
        # else. ESLint catches real bugs: undeclared globals, unused
        # vars (with the ``_``-prefixed-args opt-out), unreachable
        # code, type-coercion smells. Config lives in
        # web/eslint.config.js (flat config; flag globals from the
        # Pyodide CDN script + the build-time PRECACHE token).
        if: runner.os == 'Linux'
        working-directory: web
        shell: bash
        run: npx eslint main.js sw.js

      - name: Run pytest in the launcher's venv
        working-directory: desktop
        shell: bash
        run: pytest -v

      - name: Run shared-package pytest in the same venv
        # The shared package (data / theory / chart / presentation /
        # editor) is the single source of truth shared with the web
        # build; a regression here breaks both downstream consumers.
        # Runs on every OS because inventory I/O touches platform-
        # divergent paths (atomic-replace semantics, BOM handling,
        # line endings).
        working-directory: shared
        shell: bash
        run: pytest -v

      - name: Run web bridge pytest in the same venv
        working-directory: web
        shell: bash
        run: pytest -v

      - name: Build web artifact (Linux)
        # Exercise web/scripts/build.py at PR time so shared-source
        # or inventory renames fail here instead of leaving main red
        # after merge. Reuses the launcher's venv; no second install.
        if: runner.os == 'Linux'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: python web/scripts/build.py
