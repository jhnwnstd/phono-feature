name: Deploy web app to GitHub Pages

# Builds web/dist/ on every push to main and publishes it
# as the GitHub Pages site. The same source files that the desktop
# app uses (engine + renderer) get bundled into the deploy, so
# edits land in both places on next push. PRs run the build + smoke
# without deploying, so regressions fail pre-merge.

on:
  push:
    branches: [main]
    paths:
      - web/**
      - packages/phonology-engine/**
      - app/src/phonology_features/gui/shared/**
      - app/inventories/**
      - .github/workflows/pages.yml
  pull_request:
    branches: [main]
    paths:
      - web/**
      - packages/phonology-engine/**
      - app/src/phonology_features/gui/shared/**
      - app/inventories/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy; queue subsequent pushes rather than
# cancelling, so a fast follow-up push still publishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build the deploy artifact
        # build.py is stdlib-only (zipfile, hashlib, importlib.util); it
        # does not use the PEP 517 ``build`` package, so no install step.
        run: python web/scripts/build.py

      # Headless browser smoke over the built site; catches Pyodide
      # micropip wheel-resolution drift, engine API changes the bridge
      # missed, and JS regressions pytest can't see. See web/scripts/smoke.py
      # for the asserted coverage.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install Playwright + Chromium
        run: |
          python -m pip install playwright
          python -m playwright install chromium

      - name: Smoke-test the built site
        run: python web/scripts/smoke.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    # PRs run build + smoke but never publish to Pages.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
