name: Deploy web app to GitHub Pages

# MANUAL deploy only. Pushing to main does NOT publish the site: this
# workflow runs only when you trigger it, so spending Actions minutes
# on the expensive Playwright browser smoke + the Pages deploy is an
# intentional act, not a side effect of every small commit.
#
# Trigger it from the Actions tab ("Deploy web app to GitHub Pages" ->
# Run workflow) or the CLI:
#
#     gh workflow run pages.yml
#
# Push/PR validation still happens automatically in ci.yml, which
# builds the web artifact (web/scripts/build.py) and runs the full
# test + lint suite on every push to main and every PR. So regressions
# still fail fast; they just no longer trigger a publish. The browser
# smoke in the build job below runs at deploy time and gates the
# publish, so a broken build is never shipped.
#
# Tradeoff: main may hold built-but-unpublished work between manual
# deploys. Click Run workflow when you want the live site updated.
#
# The same shared package the desktop app uses (data / theory / chart /
# presentation / editor) is bundled into the deploy.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Deploys are manual and infrequent. If a second run is started while
# one is in flight (an accidental double Run workflow), cancel the
# older one instead of queueing it, so the extra trigger does not burn
# minutes; the latest run wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Pin the Playwright version in ONE place: the install step uses it and
    # the browser-cache key derives from it, so a version bump auto-
    # invalidates the cache instead of silently serving stale browsers (the
    # old hand-bumped ``-v1`` key never invalidated on its own). Bump this
    # to match whatever ``pip install playwright`` would otherwise resolve.
    #
    # NOTE: the official Playwright CONTAINER was evaluated to skip the
    # ~50 s ``--with-deps`` apt step but REJECTED: panphon's editdistance
    # dep has no cp313 wheel, so it compiles from source and needs g++ the
    # test-runner image omits; installing g++ needs root, but the browsers
    # require non-root (root breaks Chromium's sandbox). The runner gives
    # g++ + a writable HOME for free, so this stays on ubuntu-latest.
    env:
      PLAYWRIGHT_VERSION: "1.61.0"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          # Cache the pip download dir. The panphon install pulls numpy +
          # pandas (~22 s of download on a cold runner); caching the wheels
          # cuts the repeat-deploy install to a few seconds. No requirements
          # file lives here, so key off the desktop package metadata (stable)
          # purely for the cache hash; setup-python caches ~/.cache/pip
          # regardless of which packages that file names.
          cache: pip
          cache-dependency-path: desktop/pyproject.toml

      - name: Install panphon for the build-time lookup-table bake
        # build.py itself is stdlib-only; the only third-party need
        # is ``panphon``, used by web/scripts/bake_panphon.py to
        # produce ``_panphon_table.generated.json``. Without it the
        # bake step prints a warning and the LookupProvider drops
        # out of the web setup dialog (static presets still work).
        run: python -m pip install --quiet panphon

      - name: Build the deploy artifact
        # build.py is stdlib-only apart from the panphon import in
        # the bake step above; no PEP 517 build / no editable install
        # required.
        run: python web/scripts/build.py

      # The browser binaries are cached across deploys; the key carries the
      # browser-set tag (cfw = chromium + firefox + webkit) so changing the
      # set invalidates it, plus the pinned Playwright version so a bump
      # fetches fresh-matching binaries instead of reusing stale ones. The
      # apt system deps below are NOT cacheable on Linux and re-run anyway.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-cfw-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      # ``--with-deps`` installs the GTK / libffi / libavif system packages
      # WebKit needs on Ubuntu; without it WebKit silently skips at run time
      # and the cross-browser coverage degrades to Chromium only.
      - name: Install Playwright browsers and system deps
        run: |
          python -m pip install "playwright==${{ env.PLAYWRIGHT_VERSION }}"
          python -m playwright install --with-deps chromium firefox webkit

      - name: Smoke-test the built site
        run: python web/scripts/smoke.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
