name: Deploy web app to GitHub Pages

# Builds web/dist/ on every push to main and publishes it
# as the GitHub Pages site. The same source files that the desktop
# app uses (engine + renderer) get bundled into the deploy, so
# edits land in both places on next push.

on:
  push:
    branches: [main]
    paths:
      - web/**
      - packages/phonology-engine/**
      - app/src/phonology_features/gui/palette.py
      - app/src/phonology_features/gui/constants.py
      - app/src/phonology_features/gui/analysis.py
      - app/inventories/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight deploy; queue subsequent pushes rather than
# cancelling, so a fast follow-up push still publishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build the deploy artifact
        run: python web/scripts/build.py

      # End-to-end smoke test in headless Chromium. Boots the built
      # site through Pyodide and verifies that the bridge mounts, the
      # default inventory renders, and clicking a segment populates
      # the analysis pane. Catches Pyodide-version bumps that break
      # micropip's wheel resolution, engine API changes the bridge
      # didn't catch up to, and JS regressions that pytest can't see.
      - name: Install Playwright + Chromium
        run: |
          python -m pip install playwright
          python -m playwright install chromium
      - name: Smoke-test the built site
        run: python web/scripts/smoke.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
